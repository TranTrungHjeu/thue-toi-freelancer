spring.application.name=thuetoi-freelancer

# Cấu hình kết nối CSDL MySQL
# Hỗ trợ ghi đè bằng biến môi trường khi chạy Docker Compose
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/thuetoi?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Spring Session
# JWT dùng cơ chế stateless, không lưu session server-side.
spring.session.store-type=none

# JWT Config
app.jwt.access-token-secret=${JWT_ACCESS_SECRET:my-super-secure-access-secret-key-with-at-least-32-characters}
app.jwt.refresh-token-secret=${JWT_REFRESH_SECRET:my-super-secure-refresh-secret-key-with-at-least-32-characters}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_EXPIRE_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_EXPIRE_MS:604800000}

# Resend API Key
resend.api.key=re_TjDufQiV_KU5kbHtNfiQZMoUZXCGi67Fo

# Server Port
server.port=8080
