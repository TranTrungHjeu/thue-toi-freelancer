spring.application.name=${SPRING_APPLICATION_NAME:thuetoi-freelancer}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-db:3306/thuetoi?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:false}

# JWT
app.jwt.access-token-secret=${APP_JWT_ACCESS_TOKEN_SECRET:my-super-secure-access-secret-key-with-at-least-32-characters}
app.jwt.refresh-token-secret=${APP_JWT_REFRESH_TOKEN_SECRET:my-super-secure-refresh-secret-key-with-at-least-32-characters}
app.jwt.access-token-expiration-ms=${APP_JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${APP_JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

# OTP / Email
resend.api.key=${RESEND_API_KEY:}
resend.from=${RESEND_FROM:Thue Toi <onboarding@resend.dev>}
app.notifications.email.enabled=${APP_NOTIFICATIONS_EMAIL_ENABLED:false}
app.auth.refresh-cookie.secure=${APP_AUTH_REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie.same-site=${APP_AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
app.auth.refresh-cookie.path=${APP_AUTH_REFRESH_COOKIE_PATH:/api/v1/auth}
app.auth.refresh-cookie.domain=${APP_AUTH_REFRESH_COOKIE_DOMAIN:}
app.web.allowed-origins=${APP_WEB_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}

# SePay API v2 (VA order) + webhook: https://developer.sepay.vn
sepay.base-url=${SEPAY_API_BASE_URL:https://userapi.sepay.vn}
sepay.api-token=${SEPAY_API_TOKEN:}
sepay.bank-account-xid=${SEPAY_BANK_ACCOUNT_XID:}
sepay.va-prefix=${SEPAY_VA_PREFIX:}
sepay.webhook-api-key=${SEPAY_WEBHOOK_SECRET:}
sepay.vietqr-bank-id=${SEPAY_VIETQR_BANK_ID:}
sepay.order-duration-seconds=86400
sepay.connect-timeout-ms=10000
sepay.read-timeout-ms=30000

# File Upload (multipart + Tomcat post body must stay aligned)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=80MB
server.tomcat.max-http-form-post-size=80MB

# Cloudinary
cloudinary.url=${CLOUDINARY_URL:}

# Gemini (trích CV + chatbot; khóa qua GEMINI_API_KEY)
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:}
gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}

# AI chatbot (ngữ cảnh dự án open / in_progress, không lưu DB)
app.ai.chat.project-context-max=${APP_AI_CHAT_PROJECT_CONTEXT_MAX:40}
app.ai.chat.project-description-max=${APP_AI_CHAT_PROJECT_DESCRIPTION_MAX:200}

# Server
server.port=${SERVER_PORT:8080}

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Springdoc OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
