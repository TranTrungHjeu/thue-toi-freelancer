spring.application.name=thuetoi-freelancer

# Cấu hình kết nối CSDL MySQL
# Hỗ trợ ghi đè bằng biến môi trường khi chạy Docker Compose
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/thuetoi?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Spring Session
# Tạm dùng 'none' để tánh lỗi khởi động khi DB chưa có bảng.
# Sau khi triển khai Entity thực tế sẽ đổi lại thành 'jdbc'.
spring.session.store-type=jdbc

# Server Port
server.port=8080
