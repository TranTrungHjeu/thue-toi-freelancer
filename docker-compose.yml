services:
  # ----------------------------------------------
  # MySQL 
  # ----------------------------------------------
  mysql-db:
    image: mysql:8.0
    container_name: thuetoi-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: thuetoi
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docs/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------
  # Backend
  # ----------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thuetoi-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Saigon
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM:-Thue Toi <noreply@thuetoi.id.vn>}
      APP_AUTH_REFRESH_COOKIE_SECURE: ${APP_AUTH_REFRESH_COOKIE_SECURE:-false}
      APP_AUTH_REFRESH_COOKIE_SAME_SITE: ${APP_AUTH_REFRESH_COOKIE_SAME_SITE:-Lax}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      # SePay — see backend/src/main/resources/application.properties
      # Mode: "qr" (default, VietQR + webhook, works with any bank) or "va" (SePay v2 VA orders)
      SEPAY_MODE: ${SEPAY_MODE:-qr}
      SEPAY_WEBHOOK_SECRET: ${SEPAY_WEBHOOK_SECRET}
      # QR-only mode config
      SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
      SEPAY_BANK_CODE: ${SEPAY_BANK_CODE:-}
      SEPAY_ACCOUNT_HOLDER_NAME: ${SEPAY_ACCOUNT_HOLDER_NAME:-}
      SEPAY_QR_IMAGE_BASE_URL: ${SEPAY_QR_IMAGE_BASE_URL:-https://qr.sepay.vn/img}
      # VA mode config (only used when SEPAY_MODE=va)
      SEPAY_API_BASE_URL: ${SEPAY_API_BASE_URL:-https://userapi.sepay.vn}
      SEPAY_API_TOKEN: ${SEPAY_API_TOKEN:-}
      SEPAY_BANK_ACCOUNT_XID: ${SEPAY_BANK_ACCOUNT_XID:-}
      SEPAY_VA_PREFIX: ${SEPAY_VA_PREFIX:-}
    depends_on:
      mysql-db:
        condition: service_healthy

  # ----------------------------------------------
  # Frontend React
  # ----------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thuetoi-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_DEV_BACKEND_TARGET=http://backend:8080
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
    depends_on:
      - backend

volumes:
  mysql_data:
