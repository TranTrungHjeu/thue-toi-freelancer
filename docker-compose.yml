services:
  # ----------------------------------------------
  # MySQL 
  # ----------------------------------------------
  mysql-db:
    image: mysql:8.0
    container_name: thuetoi-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: thuetoi
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docs/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docs/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------
  # Backend
  # ----------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thuetoi-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Saigon
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM:-Thue Toi <noreply@thuetoi.id.vn>}
      APP_AUTH_REFRESH_COOKIE_SECURE: ${APP_AUTH_REFRESH_COOKIE_SECURE:-false}
      APP_AUTH_REFRESH_COOKIE_SAME_SITE: ${APP_AUTH_REFRESH_COOKIE_SAME_SITE:-Lax}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      # SePay API v2 (VA orders) + webhook auth — see backend/src/main/resources/application.properties
      SEPAY_API_BASE_URL: ${SEPAY_API_BASE_URL:-https://userapi.sepay.vn}
      SEPAY_API_TOKEN: ${SEPAY_API_TOKEN}
      SEPAY_BANK_ACCOUNT_XID: ${SEPAY_BANK_ACCOUNT_XID}
      SEPAY_VA_PREFIX: ${SEPAY_VA_PREFIX:-}
      SEPAY_WEBHOOK_SECRET: ${SEPAY_WEBHOOK_SECRET}
    depends_on:
      mysql-db:
        condition: service_healthy

  # ----------------------------------------------
  # Frontend React
  # ----------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thuetoi-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_DEV_BACKEND_TARGET=http://backend:8080
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/jsconfig.json:/app/jsconfig.json
      - ./frontend/next.config.mjs:/app/next.config.mjs
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
    depends_on:
      - backend

volumes:
  mysql_data:
