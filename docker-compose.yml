version: '3.8'

services:
  # ----------------------------------------------
  # CSDL MySQL
  # ----------------------------------------------
  mysql-db:
    image: mysql:8.0
    container_name: thuetoi-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: thuetoi
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------
  # Backend API Spring Boot
  # ----------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: thuetoi-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:mysql://mysql-db:3306/thuetoi?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USER=root
      - DB_PASSWORD=root
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql-db:
        condition: service_healthy

  # ----------------------------------------------
  # Frontend React (Chế độ Dev Hot-Reload)
  # ----------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: thuetoi-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # Cờ cấu hình giúp Vite hot-reload qua ranh giới Windows/Docker
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      # Chỉ mount các thư mục mã nguồn để hot-reload
      # Tránh mount cả root nếu không node_modules sẽ bị ghi đè bởi host
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
    depends_on:
      - backend

volumes:
  mysql_data:
