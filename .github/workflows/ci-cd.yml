name: CI/CD

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

jobs:
  test:
    name: Test And Build Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn test

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Build frontend production bundle
        working-directory: frontend
        run: npm run build

  build_push:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      owner_lc: ${{ steps.meta.outputs.owner_lc }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize image owner
        id: meta
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/thuetoi-backend:${{ github.sha }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/thuetoi-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/thuetoi-frontend:${{ github.sha }}
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/thuetoi-frontend:latest

  deploy_prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs:
      - test
      - build_push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$PROD_SSH_PORT" -H "$PROD_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment bundle
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
        run: |
          ssh -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" "mkdir -p /opt/thuetoi"
          scp -P "$PROD_SSH_PORT" docker-compose.prod.yml "$PROD_SSH_USER@$PROD_SSH_HOST:/opt/thuetoi/docker-compose.prod.yml"
          scp -P "$PROD_SSH_PORT" deploy/deploy-prod.sh "$PROD_SSH_USER@$PROD_SSH_HOST:/opt/thuetoi/deploy-prod.sh"

      - name: Deploy on VPS
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN_READ: ${{ secrets.GHCR_TOKEN_READ }}
          GHCR_OWNER: ${{ needs.build_push.outputs.owner_lc }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_TAG_B64="$(printf '%s' "$IMAGE_TAG" | base64 -w0)"
          GHCR_OWNER_B64="$(printf '%s' "$GHCR_OWNER" | base64 -w0)"
          GHCR_USERNAME_B64="$(printf '%s' "$GHCR_USERNAME" | base64 -w0)"
          GHCR_TOKEN_READ_B64="$(printf '%s' "$GHCR_TOKEN_READ" | base64 -w0)"

          cat <<EOF | ssh -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" bash
          set -euo pipefail
          chmod +x /opt/thuetoi/deploy-prod.sh
          touch /opt/thuetoi/.env.prod
          python3 - <<'PY'
          import base64
          from pathlib import Path

          env_path = Path("/opt/thuetoi/.env.prod")
          existing = {}

          if env_path.exists():
              for raw_line in env_path.read_text().splitlines():
                  if not raw_line or raw_line.startswith("#") or "=" not in raw_line:
                      continue
                  key, value = raw_line.split("=", 1)
                  existing[key] = value

          existing.update({
              "IMAGE_TAG": base64.b64decode("${IMAGE_TAG_B64}").decode(),
              "GHCR_OWNER": base64.b64decode("${GHCR_OWNER_B64}").decode(),
              "GHCR_USERNAME": base64.b64decode("${GHCR_USERNAME_B64}").decode(),
              "GHCR_TOKEN_READ": base64.b64decode("${GHCR_TOKEN_READ_B64}").decode(),
          })

          env_path.write_text(
              "\\n".join(f"{key}={value}" for key, value in existing.items()) + "\\n"
          )
          PY
          /opt/thuetoi/deploy-prod.sh
          EOF

      - name: Verify public frontend
        env:
          PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
        run: |
          test -n "$PROD_BASE_URL"
          curl --fail --silent --show-error --retry 10 --retry-delay 5 "$PROD_BASE_URL/"

      - name: Verify public health endpoint
        env:
          PROD_BASE_URL: ${{ vars.PROD_BASE_URL }}
        run: |
          curl --fail --silent --show-error --retry 10 --retry-delay 5 "$PROD_BASE_URL/api/v1/health"
