services:
  mysql-db:
    image: mysql:8.0
    container_name: thuetoi-mysql-prod
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Saigon}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GHCR_OWNER}/thuetoi-backend:${IMAGE_TAG:-latest}
    container_name: thuetoi-backend-prod
    restart: unless-stopped
    depends_on:
      mysql-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      TZ: ${TZ:-Asia/Saigon}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      APP_JWT_ACCESS_TOKEN_SECRET: ${APP_JWT_ACCESS_TOKEN_SECRET}
      APP_JWT_REFRESH_TOKEN_SECRET: ${APP_JWT_REFRESH_TOKEN_SECRET}
      APP_AUTH_REFRESH_COOKIE_SECURE: ${APP_AUTH_REFRESH_COOKIE_SECURE:-true}
      APP_AUTH_REFRESH_COOKIE_SAME_SITE: ${APP_AUTH_REFRESH_COOKIE_SAME_SITE:-Lax}
      APP_AUTH_REFRESH_COOKIE_DOMAIN: ${APP_AUTH_REFRESH_COOKIE_DOMAIN:-}
      APP_WEB_ALLOWED_ORIGINS: ${APP_WEB_ALLOWED_ORIGINS}
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    image: ghcr.io/${GHCR_OWNER}/thuetoi-frontend:${IMAGE_TAG:-latest}
    container_name: thuetoi-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3000:80"

volumes:
  mysql_data:
  backend_uploads:
